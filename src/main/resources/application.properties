server.port=3000
spring.application.name=debtor
# URL de conexăo (mude 'findash_db' para o nome do banco que vocę criou no MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/debtor?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pede para o Hibernate criar as tabelas automaticamente baseado no seu código Java
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL gerado no console (ótimo para debugar)
spring.jpa.show-sql=true